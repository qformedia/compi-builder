name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: windows-2022
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies (npm)
        run: npm ci

      - name: Download yt-dlp sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          curl -fSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin
          cp src-tauri/binaries/yt-dlp-aarch64-apple-darwin \
            src-tauri/binaries/yt-dlp-x86_64-apple-darwin
          chmod +x src-tauri/binaries/yt-dlp-*

      - name: Download yt-dlp sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -fSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe \
            -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          owner: qformedia
          repo: compi-builder-releases
          tagName: ${{ github.ref_name }}
          releaseCommitish: main
          releaseName: "CompiFlow ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
