name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
            suffix: aarch64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
            suffix: x64
          - platform: windows-2022
            args: ""
            rust_target: x86_64-pc-windows-msvc
            suffix: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Download yt-dlp sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          curl -fSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin
          cp src-tauri/binaries/yt-dlp-aarch64-apple-darwin \
            src-tauri/binaries/yt-dlp-x86_64-apple-darwin
          chmod +x src-tauri/binaries/yt-dlp-*

      - name: Download yt-dlp sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -fSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe \
            -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: ${{ matrix.args }}

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          SUFFIX="${{ matrix.suffix }}"
          TARGET="${{ matrix.rust_target }}"

          echo "=== Searching for bundle outputs under src-tauri/target/${TARGET}/release/bundle ==="
          find "src-tauri/target/${TARGET}/release/bundle" -type f 2>/dev/null | sort || echo "(nothing found)"

          BUNDLE=$(find "src-tauri/target/${TARGET}/release/bundle" -name "*.app.tar.gz" -not -name "*.sig" -type f | head -1)
          SIG=$(find "src-tauri/target/${TARGET}/release/bundle" -name "*.app.tar.gz.sig" -type f | head -1)
          DMG=$(find "src-tauri/target/${TARGET}/release/bundle" -name "*.dmg" -type f | head -1)

          echo "BUNDLE=$BUNDLE  SIG=$SIG  DMG=$DMG"

          [ -z "$BUNDLE" ] && { echo "ERROR: .app.tar.gz not found"; exit 1; }
          [ -z "$SIG" ]    && { echo "ERROR: .app.tar.gz.sig not found"; exit 1; }
          [ -z "$DMG" ]    && { echo "ERROR: .dmg not found"; exit 1; }

          cp "$BUNDLE" "artifacts/CompiFlow_${SUFFIX}.app.tar.gz"
          cp "$SIG"    "artifacts/CompiFlow_${SUFFIX}.app.tar.gz.sig"
          cp "$DMG"    "artifacts/CompiFlow_${SUFFIX}.dmg"

          echo "Collected:"
          ls -la artifacts/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts

          echo "=== Searching for bundle outputs under src-tauri/target/x86_64-pc-windows-msvc/release/bundle ==="
          find "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -type f 2>/dev/null | sort || echo "(nothing found)"

          SETUP_EXE=$(find "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -name "*-setup.exe" -type f | head -1)
          NSIS_ZIP=$(find "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -name "*.nsis.zip" -not -name "*.sig" -type f | head -1)
          NSIS_SIG=$(find "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -name "*.nsis.zip.sig" -type f | head -1)

          echo "SETUP_EXE=$SETUP_EXE  NSIS_ZIP=$NSIS_ZIP  NSIS_SIG=$NSIS_SIG"

          [ -z "$SETUP_EXE" ] && { echo "ERROR: setup.exe not found"; exit 1; }
          [ -z "$NSIS_ZIP" ]  && { echo "ERROR: .nsis.zip not found"; exit 1; }
          [ -z "$NSIS_SIG" ]  && { echo "ERROR: .nsis.zip.sig not found"; exit 1; }

          cp "$SETUP_EXE" "artifacts/CompiFlow_x64-setup.exe"
          cp "$NSIS_ZIP"   "artifacts/CompiFlow_x64-setup.nsis.zip"
          cp "$NSIS_SIG"   "artifacts/CompiFlow_x64-setup.nsis.zip.sig"

          echo "Collected:"
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rust_target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: assets
          merge-multiple: true

      - name: Verify all required files
        run: |
          echo "=== All collected assets ==="
          ls -la assets/

          for f in \
            CompiFlow_aarch64.app.tar.gz \
            CompiFlow_aarch64.app.tar.gz.sig \
            CompiFlow_x64.app.tar.gz \
            CompiFlow_x64.app.tar.gz.sig \
            CompiFlow_x64-setup.nsis.zip \
            CompiFlow_x64-setup.nsis.zip.sig \
          ; do
            [ -f "assets/$f" ] || { echo "MISSING: $f"; exit 1; }
          done

          echo "All critical updater files present."

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          gh release delete "$TAG" \
            --repo qformedia/compi-builder-releases --yes 2>/dev/null || true

          gh release create "$TAG" assets/* \
            --repo qformedia/compi-builder-releases \
            --title "CompiFlow ${TAG}" \
            --notes "See the assets below to download and install this version."

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/qformedia/compi-builder-releases/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          SIG_AARCH64=$(cat assets/CompiFlow_aarch64.app.tar.gz.sig)
          SIG_X64=$(cat assets/CompiFlow_x64.app.tar.gz.sig)
          SIG_NSIS=$(cat assets/CompiFlow_x64-setup.nsis.zip.sig)

          jq -n \
            --arg version "$VERSION" \
            --arg notes "CompiFlow ${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --arg sig_aarch64 "$SIG_AARCH64" \
            --arg url_aarch64 "${BASE}/CompiFlow_aarch64.app.tar.gz" \
            --arg sig_x64 "$SIG_X64" \
            --arg url_x64 "${BASE}/CompiFlow_x64.app.tar.gz" \
            --arg sig_nsis "$SIG_NSIS" \
            --arg url_nsis "${BASE}/CompiFlow_x64-setup.nsis.zip" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig_aarch64, url: $url_aarch64 },
                "darwin-x86_64": { signature: $sig_x64, url: $url_x64 },
                "windows-x86_64": { signature: $sig_nsis, url: $url_nsis }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "$TAG" latest.json \
            --repo qformedia/compi-builder-releases --clobber
