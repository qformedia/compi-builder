name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-2022

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Create sidecar placeholder (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/yt-dlp-aarch64-apple-darwin
          touch src-tauri/binaries/yt-dlp-x86_64-apple-darwin

      - name: Create sidecar placeholder (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries
          New-Item -ItemType File -Force -Path src-tauri\binaries\yt-dlp-x86_64-pc-windows-msvc.exe
        shell: pwsh

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --lib

  frontend-test:
    name: npm test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    needs: [test, frontend-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
            suffix: aarch64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
            suffix: x64
          - platform: windows-2022
            args: ""
            rust_target: x86_64-pc-windows-msvc
            suffix: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Download yt-dlp sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          curl -fSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin
          cp src-tauri/binaries/yt-dlp-aarch64-apple-darwin \
            src-tauri/binaries/yt-dlp-x86_64-apple-darwin
          chmod +x src-tauri/binaries/yt-dlp-*

      - name: Download yt-dlp sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -fSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe \
            -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe

      - name: Build and sign Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx tauri build ${{ matrix.args }}

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          SUFFIX="${{ matrix.suffix }}"
          TARGET="${{ matrix.rust_target }}"
          BDIR="src-tauri/target/${TARGET}/release/bundle"

          echo "=== Bundle outputs ==="
          find "$BDIR" -type f 2>/dev/null | sort

          BUNDLE=$(find "$BDIR" -name "*.app.tar.gz" -not -name "*.sig" -type f | head -1)
          SIG=$(find "$BDIR" -name "*.app.tar.gz.sig" -type f | head -1)
          DMG=$(find "$BDIR" -name "*.dmg" -type f | head -1)

          [ -z "$BUNDLE" ] && { echo "ERROR: .app.tar.gz not found"; exit 1; }
          [ -z "$SIG" ]    && { echo "ERROR: .app.tar.gz.sig not found"; exit 1; }
          [ -z "$DMG" ]    && { echo "ERROR: .dmg not found"; exit 1; }

          cp "$BUNDLE" "artifacts/CompiFlow_${SUFFIX}.app.tar.gz"
          cp "$SIG"    "artifacts/CompiFlow_${SUFFIX}.app.tar.gz.sig"
          cp "$DMG"    "artifacts/CompiFlow_${SUFFIX}.dmg"

          ls -la artifacts/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts

          echo "=== Bundle outputs ==="
          find src-tauri/target -name "*-setup.exe" -o -name "*-setup.exe.sig" 2>/dev/null | sort

          SETUP_EXE=$(find src-tauri/target -name "*-setup.exe" -not -name "*.sig" -type f | head -1)
          SETUP_SIG=$(find src-tauri/target -name "*-setup.exe.sig" -type f | head -1)

          [ -z "$SETUP_EXE" ] && { echo "ERROR: setup.exe not found"; exit 1; }
          [ -z "$SETUP_SIG" ] && { echo "ERROR: setup.exe.sig not found"; exit 1; }

          cp "$SETUP_EXE" "artifacts/CompiFlow_x64-setup.exe"
          cp "$SETUP_SIG" "artifacts/CompiFlow_x64-setup.exe.sig"

          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rust_target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: assets
          merge-multiple: true

      - name: Verify all required files
        run: |
          echo "=== All collected assets ==="
          ls -la assets/

          for f in \
            CompiFlow_aarch64.app.tar.gz \
            CompiFlow_aarch64.app.tar.gz.sig \
            CompiFlow_x64.app.tar.gz \
            CompiFlow_x64.app.tar.gz.sig \
            CompiFlow_x64-setup.exe \
            CompiFlow_x64-setup.exe.sig \
          ; do
            [ -f "assets/$f" ] || { echo "MISSING: $f"; exit 1; }
          done

          echo "All critical updater files present."

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          gh release delete "$TAG" \
            --repo qformedia/compi-builder-releases --yes 2>/dev/null || true

          gh release create "$TAG" assets/* \
            --repo qformedia/compi-builder-releases \
            --title "CompiFlow ${TAG}" \
            --notes "See the assets below to download and install this version."

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/qformedia/compi-builder-releases/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          SIG_AARCH64=$(cat assets/CompiFlow_aarch64.app.tar.gz.sig)
          SIG_X64=$(cat assets/CompiFlow_x64.app.tar.gz.sig)
          SIG_WIN=$(cat assets/CompiFlow_x64-setup.exe.sig)

          jq -n \
            --arg version "$VERSION" \
            --arg notes "CompiFlow ${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --arg sig_aarch64 "$SIG_AARCH64" \
            --arg url_aarch64 "${BASE}/CompiFlow_aarch64.app.tar.gz" \
            --arg sig_x64 "$SIG_X64" \
            --arg url_x64 "${BASE}/CompiFlow_x64.app.tar.gz" \
            --arg sig_win "$SIG_WIN" \
            --arg url_win "${BASE}/CompiFlow_x64-setup.exe" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig_aarch64, url: $url_aarch64 },
                "darwin-x86_64": { signature: $sig_x64, url: $url_x64 },
                "windows-x86_64": { signature: $sig_win, url: $url_win }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "$TAG" latest.json \
            --repo qformedia/compi-builder-releases --clobber
