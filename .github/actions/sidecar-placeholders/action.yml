name: Create sidecar placeholders
description: Creates empty yt-dlp sidecar files so Tauri's build script can compile without the real binaries.

runs:
  using: composite
  steps:
    - name: Create sidecar placeholder (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p src-tauri/binaries/yt-dlp_macos
        touch src-tauri/binaries/yt-dlp_macos/.gitkeep

    - name: Create sidecar placeholder (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path src-tauri\binaries
        New-Item -ItemType File -Force -Path src-tauri\binaries\yt-dlp-x86_64-pc-windows-msvc.exe
